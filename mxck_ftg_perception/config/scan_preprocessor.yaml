/**:
  ros__parameters:
    scan_topic: "/scan"
    base_frame: "base_link"
    filtered_scan_topic: "/autonomous/ftg/scan_filtered"
    front_clearance_topic: "/autonomous/ftg/front_clearance"
    status_topic: "/autonomous/ftg/status"

    # MXCK LiDAR mounting assumption:
    # vehicle forward appears near +135 deg in raw /scan.
    front_center_deg: 0.0

    front_fov_deg: 100.0

    clip_min_range_m: 0.18
    clip_max_range_m: 5.0

    enable_moving_average: false
    moving_average_window: 3
